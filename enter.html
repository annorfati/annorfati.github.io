<!DOCTYPE html>
<html>
<head>
<style>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  
body {
  background: #282020;
  color: #A28B8B;

  display: flex;
  justify-content: center;
  align-items: center;

  height: 100vh;

  font-family: Commit Mono, monospace;
}

a {
  color: inherit;
  text-decoration: none;

  letter-spacing: 4px;
  font-size: 18px;
}

#overlay {
  position: fixed;

  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  background: #282020;

  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 9999;

  transition: opacity 1.5s ease;
}

#enter-button {
  color: #CBBEBE;

  letter-spacing: 6px;

  cursor: pointer;

  font-size: 18px;
}

</style>
</head>

<body>

<div id="overlay">

  <div id="enter-button">
    enter archive
  </div>

</div>

<a href="archive.html">
  enter archive
</a>

</body>
</html>
