<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  background: #282020;
  color: #A28B8B;
  font-family: Commit Mono, monospace;
  text-align: center;
  margin: 0;
  padding: 15px;
}

h1 {
  font-weight: 100;
  letter-spacing: 6px;
  font-size: 22px;

  opacity: 0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {

  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }

}

@keyframes enterFade {

  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }

}

#overlay {

  position: fixed;

  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  background: #282020;

  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 9999;

  transition: opacity 2.5s ease;
}

#enter-button {

  color: #A28B8B;

  font-family: Commit Mono, monospace;

  font-size: 18px;

  letter-spacing: 6px;

  cursor: pointer;

  opacity: 0;

  animation: enterFade 1.5s forwards;
}

#homepage-content {

  opacity: 0;

  transition: opacity 2s ease;
}

.subtitle {

  opacity: 0;

  font-size: 13px;

  letter-spacing: 2px;

  color: #CBBEBE;

  animation: fadeIn 2s forwards;

  animation-delay: 1s;

  transition: opacity 1.5s ease;
}

.menu {

  margin-top: 80px;
}

.menu a {

  display: block;

  margin: 25px 0;

  color: #CBBEBE;

  text-decoration: none;

  letter-spacing: 4px;

  font-size: 16px;

  transition: opacity 0.3s ease;
}

.menu a:hover {

  opacity: 0.6;
}

footer {

  margin-top: 100px;

  font-size: 11px;

  opacity: 0.5;

  letter-spacing: 2px;
}

</style>

</head>

<body>

<div id="overlay">
  <div id="enter-button"></div>
</div>

<div id="homepage-content">

  <h1>annorfati</h1>

  <p class="subtitle" id="subtitle">
    just having fun and making art
  </p>

  <div class="menu">

    <a href="archive.html">archive</a>

    <a href="notes.html">notebook</a>

  </div>

  <footer>
    ongoing website, 2025–
  </footer>

</div>

<script>

const text = "enter archive";

let i = 0;

function typeWriter() {

  if (i < text.length) {

    document.getElementById("enter-button").innerHTML +=
      text.charAt(i);

    i++;

    setTimeout(typeWriter, 150);

  }

}

setTimeout(typeWriter, 3000);

document.getElementById("enter-button").onclick =
function() {

  document.getElementById("overlay").style.opacity =
    "0";

  setTimeout(function() {

    document.getElementById("overlay").style.display =
      "none";

    document.getElementById("homepage-content")
      .style.opacity = "1";

  }, 2500);

};

const subtitles = [

  "just having fun and making art",

  ":)",

  "amor fati",

  "annorfati"

];

let subtitleIndex = 0;

setInterval(function() {

  const subtitle =
    document.getElementById("subtitle");

  subtitle.style.opacity = "0";

  setTimeout(function() {

    subtitleIndex =
      (subtitleIndex + 1) % subtitles.length;

    subtitle.innerHTML =
      subtitles[subtitleIndex];

    subtitle.style.opacity = "1";

  }, 1000);

}, 9000);

</script>

</body>
</html>
