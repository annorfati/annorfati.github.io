<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  background: #282020;
  color: #A28B8B;
  font-family: Commit Mono, monospace;
  text-align: center;
  margin: 0;
  padding: 15px;
}
  
h1 {
  font-weight: 100;
  letter-spacing: 6px;
  font-size: 22px;

  opacity: 0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }
}

@keyframes enterFade {

  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }

}

@keyframes pulse {

  0% {
    opacity: 0.35;
  }

  30% {
    opacity: 1;
  }

  70% {
    opacity: 1;
  }

  100% {
    opacity: 0.25;
  }

}

.menu {
  margin-top: 80px;
}

.menu a {

  display: block;

  margin: 25px 0;

  color: #CBBEBE;

  text-decoration: none;

  letter-spacing: 4px;

  font-size: 16px;

  transition: opacity 0.3s ease;
}

.menu a:hover {
  opacity: 0.6;
}

.subtitle {
  opacity: 0;

  font-size: 13px;

  letter-spacing: 2px;

  color: #CBBEBE;

  animation: fadeIn 2s forwards;

  animation-delay: 1s;

  transition: opacity 2s ease;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 40px;
  padding: 30px;
}

.artwork {
  text-align: center;

  opacity: 1;

  transition: opacity 0.6s ease;
}
  
.artwork img {
  width: 100%;
  max-height: 350px;

  object-fit: contain;

  cursor: pointer;

  opacity: 1;

  transition: opacity 0.5s ease;
}

.artwork:hover {
  opacity: 1 !important;
}

.info {
  margin-top: 10px;

  color: #CBBEBE;
  font-size: 15px;
  font-family: Commit Mono, monospace;
  letter-spacing: 2px;

  opacity: 0;
  transition: opacity 0.5s ease;
}

.artwork:hover .info {
  opacity: 1;
}
  
#lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  background: rgba(20,20,20,0.5);

  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);

  justify-content: center;
  align-items: center;

  z-index: 1000;
}
  
#lightbox-img {
  max-width: 90vw;
  max-height: 75vh;
}

@media (max-width: 768px) {

  .artwork {
    animation: none;
  }

  #prev-btn,
  #next-btn {

  display: block;

  position: fixed;

  bottom: 40px;

  top: auto;

  transform: none;

  opacity: 1;
 }

} 
#mobile-nav {
  display: none;
}

#lightbox-content {
  display: flex;
  flex-direction: column;
  align-items: center;

  max-width: 90vw;
  max-height: 90vh;

  position: relative;
}

#lightbox-caption {

  margin-top: 15px;

  margin-left: 25px;

  color: #DFD7D7;

  font-size: 14px;

  letter-spacing: 2px;
}

#overlay {
  position: fixed;

  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  background: #282020;

  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 9999;

  transition: opacity 2.5s ease;
}

#archive-content {

  opacity: 0;

  transition: opacity 2s ease;
}

#enter-button {
  color: #A28B8B;

  font-family: Commit Mono, monospace;

  font-size: 18px;

  letter-spacing: 6px;

  cursor: pointer;
  
  opacity: 0;

  animation: enterFade 1.5s forwards;
}

#prev-btn,
#next-btn {

  position: absolute;

  background: none;
  border: none;

  color: #DFD7D7;

  font-size: 22px;

  opacity: 0.5;

  transition: opacity 0.3s ease;

  cursor: pointer;
}

#prev-btn {
  left: -60px;
  top: 40%;
  transform: translateY(-50%);
}

#next-btn {
  right: -60px;
  top: 40%;
  transform: translateY(-50%);
}

#prev-btn:hover,
#next-btn:hover {
  opacity: 1;
}
  
footer {
  margin-top: 100px;

  font-size: 11px;

  opacity: 0.5;

  letter-spacing: 2px;
}
  
</style>
</head>

<body>
  
<div id="overlay">
 <div id="enter-button"></div>
</div>

<div id="archive-content">
  
<h1>an online archive</h1>
<p class="subtitle" id="subtitle">
  just having fun and making art
</p>
  
<div class="menu">

  <a href="archive.html">archive</a>

  <a href="notes.html">notebook</a>

</div>
  
<footer>
  ongoing archive, 2025–
</footer>
</div>
  
<script>
let lastScrollTop = 0;

  const artworks =
    document.querySelectorAll(".artwork");

  const screenCenter =
    window.innerHeight / 2;

  artworks.forEach(function(item) {

    const rect =
      item.getBoundingClientRect();

    const itemCenter =
      rect.top + rect.height / 2;

    const distance =
      Math.abs(itemCenter - screenCenter);

    const maxDistance =
      window.innerHeight / 2;

    let opacity =
      1 - distance / maxDistance;

    opacity =
      Math.max(0.25, opacity);

    item.style.opacity = opacity;
    
  const caption = item.querySelector(".info");

if (caption) {
  caption.style.opacity = Math.max(0.4, opacity);
}

  });

}

window.addEventListener("scroll", updateOpacity);

updateOpacity();

const subtitles = [
  "just having fun and making art",
  ":)",
  "amor fati",
  "annorfati"
];

let subtitleIndex = 0;

setInterval(function() {

  const subtitle =
    document.getElementById("subtitle");

  subtitle.style.opacity = "0";

  setTimeout(function() {

    subtitleIndex =
      (subtitleIndex + 1) % subtitles.length;

    subtitle.innerHTML =
      subtitles[subtitleIndex];

    subtitle.style.opacity = "1";

  }, 1000);

}, 9000);
setTimeout(typeWriter, 3000);

</script>

</body>
</html>
